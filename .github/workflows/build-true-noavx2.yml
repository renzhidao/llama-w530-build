name: Build True NoAVX2 PR22836
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 1. Clone
        run: git clone https://github.com/ggml-org/llama.cpp.git .

      - name: 2. Time Travel to PR 22836 (混元 STQ 内核)
        run: |
          git fetch origin pull/22836/head:pr22836
          git checkout pr22836

      - name: 3. Configure (双重封杀 AVX2)
        run: cmake -B build -DLLAMA_AVX=ON -DLLAMA_AVX2=OFF -DLLAMA_FMA=OFF -DLLAMA_AVX512=OFF -DGGML_AVX=ON -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_AVX512=OFF

      - name: 4. Build Release
        run: cmake --build build --config Release --target llama-server -j 8

      - name: 5. Pack Engine
        run: |
          mkdir W530_Final
          copy build\bin\Release\llama-server.exe W530_Final\
          copy build\bin\Release\*.dll W530_Final\ 2>nul || echo "Maybe statically linked"

      - name: 6. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Llama-Server-True-NoAVX2
          path: W530_Final\*
