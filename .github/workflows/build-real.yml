name: Build Real W530 Hy-MT
on: [push, workflow_dispatch]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 1. Clone Llama.cpp Official
        run: git clone https://github.com/ggml-org/llama.cpp.git .

      - name: 2. Force Inject Tencent STQ Kernel
        run: |
          echo "💉 正在强行把腾讯的 1.25Bit 底层内核打进官方源码里..."
          git fetch origin pull/22836/head:hy-mt-stq || echo "Fetch PR 22836 failed, trying fallback search..."
          git checkout hy-mt-stq || (
            echo "⚠️ 直接获取 22836 失败，正在通过 GitHub CLI 强行模糊检索 STQ 补丁..."
            GH_TOKEN=${{ secrets.GITHUB_TOKEN }} gh pr checkout $(gh pr list --repo ggml-org/llama.cpp --search "STQ" --state all --json number --jq '.[0].number')
          )

      - name: 3. Configure (No-AVX2 / W530)
        run: cmake -B build -DGGML_AVX=ON -DGGML_AVX2=OFF -DGGML_FMA=OFF -DGGML_AVX512=OFF

      - name: 4. Build Release
        run: cmake --build build --config Release --target llama-server -j 8

      - name: 5. Pack Engine
        run: |
          mkdir W530_Final
          copy build\bin\Release\llama-server.exe W530_Final\
          copy build\bin\Release\*.dll W530_Final\

      - name: 6. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Llama-Server-HyMT-W530
          path: W530_Final\*
